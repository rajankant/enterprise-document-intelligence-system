[pytest]
# Pytest configuration

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    slow: slow running tests
    integration: integration tests
    unit: unit tests
    api: API tests
    
# Test paths
testpaths = tests

# Minimum Python version
minversion = 6.0

# Coverage options
[coverage:run]
branch = True
source = app

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
